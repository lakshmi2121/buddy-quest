<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --bg1:#EAF2FF;
    --bg2:#FDF4FF;
    --coral:#FF6B6B;
    --coral-dark:#E5484D;
    --gold:#FFD166;
    --mint:#06D6A0;
    --navy:#1B1F3B;
    --card:#FFFFFF;
    --purple:#8B7FE8;
    --shadow: 0 8px 24px rgba(27,31,59,0.10);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  body{
    margin:0;
    font-family:'Nunito', sans-serif;
    background: radial-gradient(circle at 20% 0%, var(--bg2), var(--bg1) 60%);
    color: var(--navy);
    min-height:100vh;
    overscroll-behavior:none;
  }
  h1,h2,h3,.display{ font-family:'Baloo 2', sans-serif; }
  #app{ max-width:640px; margin:0 auto; padding:18px 16px 100px; min-height:100vh; position:relative; }

  /* ---- Top bar ---- */
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .points-badge{
    background:var(--card); border-radius:999px; padding:8px 16px;
    box-shadow:var(--shadow); display:flex; align-items:center; gap:8px;
    font-weight:800; font-size:15px;
  }
  .streak-badge{ background:linear-gradient(135deg,#FFD166,#FF6B6B); color:white; border-radius:999px; padding:8px 14px; font-weight:800; font-size:14px; box-shadow:var(--shadow);}
  .gear-btn{
    width:40px; height:40px; border-radius:50%; background:var(--card); border:none;
    box-shadow:var(--shadow); font-size:18px; display:flex; align-items:center; justify-content:center;
    color: var(--navy); opacity:0.55;
  }

  /* ---- Buddy hero ---- */
  .buddy-hero{ text-align:center; margin:6px 0 22px; }
  .buddy-avatar-wrap{
    width:180px; height:180px; margin:0 auto 4px; border-radius:50%;
    background: linear-gradient(160deg, #fff, #F0F4FF);
    display:flex; align-items:center; justify-content:center;
    box-shadow: var(--shadow);
    border: 5px solid white;
    animation: float 3.2s ease-in-out infinite, popIn .6s cubic-bezier(.34,1.56,.64,1);
    overflow:hidden; position:relative; cursor:pointer;
  }
  .buddy-avatar-wrap canvas{ width:100% !important; height:100% !important; display:block; }
  @keyframes float{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-8px) } }
  @keyframes popIn{ 0%{ transform:scale(0.2); opacity:0;} 70%{ transform:scale(1.08); opacity:1;} 100%{ transform:scale(1);} }
  .tap-hint{ font-size:11px; font-weight:700; opacity:0.4; margin-bottom:8px; }
  .speech-bubble{
    background:var(--card); border-radius:20px; padding:14px 18px; box-shadow:var(--shadow);
    display:inline-block; max-width:90%; font-weight:700; font-size:15.5px; position:relative; line-height:1.4;
  }
  .speech-bubble:after{
    content:''; position:absolute; top:-8px; left:50%; transform:translateX(-50%) rotate(45deg);
    width:16px; height:16px; background:var(--card);
  }
  .buddy-name{ font-size:22px; font-weight:800; margin:10px 0 2px; }

  /* progress ring of stars */
  .star-row{ display:flex; justify-content:center; gap:4px; margin:10px 0 4px; font-size:18px; }
  .star-row span{ opacity:0.25; transition:opacity .3s, transform .3s;}
  .star-row span.lit{ opacity:1; transform:scale(1.15); }

  /* ---- Section labels ---- */
  .section-label{ font-family:'Baloo 2'; font-weight:700; font-size:14px; color:var(--navy); opacity:0.55;
    text-transform:uppercase; letter-spacing:0.06em; margin: 18px 4px 8px; }

  /* ---- Task cards ---- */
  .task-card{
    background:var(--card); border-radius:18px; padding:14px 16px; margin-bottom:10px;
    display:flex; align-items:center; gap:14px; box-shadow:var(--shadow);
    border: 2px solid transparent; transition: transform .15s ease;
    cursor:pointer; user-select:none;
  }
  .task-card:active{ transform:scale(0.97); }
  .task-card.due{ border-color: var(--coral); animation:pulse 1.4s infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(255,107,107,0.35);} 50%{ box-shadow:0 0 0 8px rgba(255,107,107,0);} }
  .task-card.done{ opacity:0.55; }
  .task-card.done .task-name{ text-decoration: line-through; }
  .task-emoji{
    width:46px; height:46px; border-radius:14px; background:#F4F1FF; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:24px;
  }
  .task-card.done .task-emoji{ background:#E6FBF4; }
  .task-info{ flex:1; min-width:0; }
  .task-name{ font-weight:800; font-size:15.5px; }
  .task-meta{ font-size:13px; opacity:0.6; font-weight:700; margin-top:2px; }
  .task-points{ font-weight:800; color:var(--purple); font-size:14px; flex-shrink:0; }
  .check-circle{
    width:30px; height:30px; border-radius:50%; border:2.5px solid #DDD; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:16px; color:white;
  }
  .check-circle.checked{ background:var(--mint); border-color:var(--mint); }

  .empty-state{ text-align:center; padding:40px 20px; opacity:0.6; font-weight:700; }

  /* ---- Bottom nav ---- */
  .bottom-bar{
    position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:center; padding:14px;
    pointer-events:none;
  }
  .bottom-pill{
    background:var(--card); box-shadow:var(--shadow); border-radius:999px; padding:8px; display:flex; gap:6px;
    pointer-events:all;
  }
  .bottom-pill button{
    border:none; background:transparent; padding:10px 18px; border-radius:999px; font-weight:800;
    font-family:'Baloo 2'; font-size:14px; color:var(--navy); opacity:0.5;
  }
  .bottom-pill button.active{ background:var(--coral); color:white; opacity:1; }

  /* ---- Modal / overlay ---- */
  .overlay{
    position:fixed; inset:0; background:rgba(27,31,59,0.45); display:flex; align-items:flex-end;
    justify-content:center; z-index:50; backdrop-filter: blur(2px);
  }
  .overlay.center{ align-items:center; padding:20px;}
  .sheet{
    background:var(--bg1); width:100%; max-width:640px; border-radius:24px 24px 0 0; padding:20px 18px 30px;
    max-height:85vh; overflow-y:auto;
  }
  .overlay.center .sheet{ border-radius:24px; max-height:80vh; }
  .sheet h2{ margin:0 0 14px; font-size:20px; }
  label{ font-weight:800; font-size:13px; opacity:0.7; display:block; margin: 14px 0 6px; }
  input[type=text], input[type=time], input[type=number]{
    width:100%; padding:12px 14px; border-radius:12px; border:2px solid #E3E8F5; font-size:15px;
    font-family:'Nunito'; background:white;
  }
  .emoji-grid{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
  .emoji-pick{
    width:42px; height:42px; border-radius:12px; background:white; border:2px solid #E3E8F5; font-size:20px;
    display:flex; align-items:center; justify-content:center;
  }
  .emoji-pick.sel{ border-color:var(--coral); background:#FFF0F0; }
  .btn{
    border:none; border-radius:14px; padding:13px 18px; font-weight:800; font-family:'Baloo 2'; font-size:15px;
    width:100%; margin-top:16px; box-shadow:var(--shadow);
  }
  .btn-primary{ background:var(--coral); color:white; }
  .btn-secondary{ background:white; color:var(--navy); }
  .btn-ghost{ background:transparent; color:var(--coral-dark); box-shadow:none; text-decoration:underline; font-size:13px;}
  .close-x{ position:absolute; top:14px; right:16px; font-size:20px; opacity:0.5; background:none; border:none; }

  .admin-task-row{
    background:white; border-radius:14px; padding:10px 12px; display:flex; align-items:center; gap:10px;
    margin-bottom:8px; box-shadow:var(--shadow);
  }
  .admin-task-row .t-emoji{ font-size:20px; width:32px; text-align:center; }
  .admin-task-row .t-info{ flex:1; }
  .admin-task-row .t-name{ font-weight:800; font-size:14px; }
  .admin-task-row .t-meta{ font-size:12px; opacity:0.55; font-weight:700; }
  .icon-btn{ background:#F1F2F8; border:none; width:32px; height:32px; border-radius:10px; font-size:14px; }

  .ach-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
  .ach-card{ background:white; border-radius:16px; padding:12px; text-align:center; box-shadow:var(--shadow); }
  .ach-card.locked{ opacity:0.35; }
  .ach-emoji{ font-size:28px; }
  .ach-title{ font-weight:800; font-size:12.5px; margin-top:4px; }

  .toast{
    position:fixed; top:18px; left:50%; transform:translateX(-50%); background:var(--navy); color:white;
    padding:12px 18px; border-radius:14px; font-weight:700; font-size:14px; z-index:80; box-shadow:var(--shadow);
    max-width:88%; text-align:center;
  }

  .celebrate-overlay{
    position:fixed; inset:0; z-index:90; display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .celebrate-card{
    background:white; border-radius:24px; padding:28px 34px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.25);
    animation: pop .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop{ 0%{ transform:scale(0.5); opacity:0;} 100%{ transform:scale(1); opacity:1;} }
  .celebrate-card .big{ font-size:54px; }
  .sparkle{ position:absolute; font-size:22px; animation: spark 1s ease-out forwards; }
  @keyframes spark{ 0%{ transform:translate(0,0) scale(0.6); opacity:1;} 100%{ transform: var(--end) scale(1.1); opacity:0;} }

  .gate-q{ font-size:22px; font-weight:800; text-align:center; margin:18px 0; }
  .gate-input{ text-align:center; font-size:22px; font-weight:800; }
</style>

<body>
<div id="app"><div class="empty-state">Loading Buddy… 🐾</div></div>

<script>
const STORE_KEY = 'buddy-app-state-v1';
const QUICK_EMOJIS = ['🪥','🍎','📚','🛏️','🧹','🎒','👕','🚿','🏃','🎨','🍽️','🧸','🎵','💧','✏️','🧦','🐶','⏰','🧴','🎮','🔢','➕','➗','🧮','📐','💻'];
// Custom (image-based) task icons, using the same uploaded artwork as the custom avatar.
const CUSTOM_TASK_ICON_KEYS = ['reading_monster'];
const AVATARS = ['🦊','🐵','🐯','🦁','🐰','🐼','🐨','🐸','🦄','🐲','🐱','🐻'];

// Custom (non-emoji) avatars added from uploaded images.
const CUSTOM_AVATARS = {
  'reading_monster': { img: 'avatar-reading-monster.png', label:'Reading Buddy' },
};
const CUSTOM_AVATAR_KEYS = Object.keys(CUSTOM_AVATARS);

function isCustomAvatar(key){ return Object.prototype.hasOwnProperty.call(CUSTOM_AVATARS, key); }
// Renders either the emoji glyph or a thumbnail image for a given avatar key, sized to fit a text/icon slot.
function avatarPreviewHtml(key, sizePx){
  if (isCustomAvatar(key)) {
    return `<img src="${CUSTOM_AVATARS[key].img}" style="width:${sizePx}px; height:${sizePx}px; object-fit:contain; vertical-align:middle;">`;
  }
  return `<span style="font-size:${sizePx}px; line-height:1;">${key}</span>`;
}

// Maps each emoji avatar choice to a look for the 3D character.
const AVATAR_STYLES = {
  '🦊': { color:0xFF8C42, belly:0xFFF3E6, ear:'pointy' },
  '🐵': { color:0xA9714B, belly:0xE8CBA8, ear:'round' },
  '🐯': { color:0xF4A93B, belly:0xFFF3D6, ear:'round' },
  '🦁': { color:0xF2C14E, belly:0xFFF6D9, ear:'round' },
  '🐰': { color:0xF5F5F5, belly:0xFFE1EC, ear:'long' },
  '🐼': { color:0xFAFAFA, belly:0xFFFFFF, ear:'roundBlack' },
  '🐨': { color:0xB0B0B0, belly:0xE9E9E9, ear:'roundBig' },
  '🐸': { color:0x6BCB77, belly:0xE3FFE8, ear:'none' },
  '🦄': { color:0xFDEBFF, belly:0xFFFFFF, ear:'horn' },
  '🐲': { color:0x4CAF7D, belly:0xD9FFE9, ear:'wings' },
  '🐱': { color:0xE8A87C, belly:0xFFF1E3, ear:'pointy' },
  '🐻': { color:0x8B5E3C, belly:0xE3C7A4, ear:'round' },
  'reading_monster': { color:0xB565E8, belly:0xE6C9FA, ear:'roundSmall', glasses:true },
};

const GREETING_LINES = [
  "Ready for today's quest?",
  "Let's get some tasks done together!",
  "I believe in you today!",
  "Let's make today awesome!",
];
const TASK_DONE_LINES = [
  "Good job! You did it!",
  "Woohoo! Nice work!",
  "You're on fire today!",
  "Awesome! High five!",
  "That's my buddy!",
];
const ALL_DONE_LINES = [
  "You finished everything today! I'm so proud of you!",
  "Wow, a perfect day! You're amazing!",
];


const ACHIEVEMENTS = [
  { id:'first_task', emoji:'🌟', title:'First Steps', desc:'Complete your first task', test: s => totalCompletedEver(s) >= 1 },
  { id:'perfect_day', emoji:'🏆', title:'Perfect Day', desc:'Finish every task in a day', test: s => hadPerfectDay(s) },
  { id:'streak3', emoji:'🔥', title:'3-Day Streak', desc:'3 days in a row', test: s => s.streak >= 3 },
  { id:'streak7', emoji:'🔥🔥', title:'Weekly Wonder', desc:'7 days in a row', test: s => s.streak >= 7 },
  { id:'points100', emoji:'💯', title:'Century Club', desc:'Earn 100 total points', test: s => lifetimePoints(s) >= 100 },
  { id:'points500', emoji:'👑', title:'Buddy Champion', desc:'Earn 500 total points', test: s => lifetimePoints(s) >= 500 },
];

function todayKey(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function nowHM(){
  const d = new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function defaultState(){
  return {
    buddy: { name:'Buddy', avatar:'🦊', setup:false },
    kidName: '',
    tasks: [
      { id:'t1', time:'07:30', name:'Brush Teeth', emoji:'🪥', points:10 },
      { id:'t2', time:'08:00', name:'Eat Breakfast', emoji:'🍎', points:10 },
      { id:'t3', time:'09:00', name:'Reading Time', emoji:'📚', points:15 },
      { id:'t4', time:'16:00', name:'Tidy Up Room', emoji:'🧹', points:15 },
      { id:'t5', time:'19:30', name:'Get Ready for Bed', emoji:'🛏️', points:10 },
    ],
    progress: {}, // { 'YYYY-MM-DD': { entries: { taskId: points }, } }
    streak: 0,
    lastDate: null,
    unlocked: [],
    lastWeeklySummaryShown: null,
  };
}

let state = null;
let view = 'buddy'; // 'buddy' | 'admin'
let adminTab = 'tasks'; // 'tasks' | 'buddy' | 'achievements'
let notifiedThisTick = new Set();
let editingTaskId = null;

function lifetimePoints(s){
  let total = 0;
  for (const k in s.progress) {
    const entries = s.progress[k].entries || {};
    for (const tid in entries) total += entries[tid];
  }
  return total;
}
function totalCompletedEver(s){
  let c = 0;
  for (const k in s.progress) c += Object.keys(s.progress[k].entries || {}).length;
  return c;
}
function hadPerfectDay(s){
  for (const k in s.progress) {
    const entries = Object.keys(s.progress[k].entries || {});
    if (entries.length > 0 && entries.length >= s.tasks.length && s.tasks.length > 0) return true;
  }
  return false;
}

function dateKeyOffset(daysAgo){
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function weekdayLabel(daysAgo){
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return d.toLocaleDateString(undefined, { weekday: 'short' });
}
// Stats for the week just finished: Sunday through Friday, recapped Saturday morning.
function getWeekStats(){
  const days = [];
  let totalPoints = 0, totalTasks = 0, perfectDays = 0, bestDay = null;
  for (let i = 1; i <= 6; i++) { // yesterday (Fri) back through 6 days ago (Sun)
    const key = dateKeyOffset(i);
    const entries = (state.progress[key] && state.progress[key].entries) || {};
    const pts = Object.values(entries).reduce((a,b)=>a+b,0);
    const count = Object.keys(entries).length;
    totalPoints += pts; totalTasks += count;
    if (count > 0 && count >= state.tasks.length) perfectDays++;
    if (!bestDay || pts > bestDay.pts) bestDay = { label: weekdayLabel(i), pts };
    days.push({ label: weekdayLabel(i), pts, count, money: dayMoney(key) });
  }
  days.reverse();
  const totalMoney = Math.round(days.reduce((a,d)=>a+d.money,0) * 100) / 100;
  return { days, totalPoints, totalTasks, perfectDays, bestDay, totalMoney };
}

/* ---- Money: convert points to allowance, capped per day ---- */
const DAILY_MAX_DOLLARS = 5;
function dayMoney(dateKey){
  const possible = state.tasks.reduce((a,t)=>a+t.points, 0);
  if (possible <= 0) return 0;
  const entries = (state.progress[dateKey] && state.progress[dateKey].entries) || {};
  const earned = Object.values(entries).reduce((a,b)=>a+b,0);
  const dollars = Math.min(DAILY_MAX_DOLLARS, (earned/possible) * DAILY_MAX_DOLLARS);
  return Math.round(dollars * 100) / 100;
}
function fmtMoney(n){ return '$' + n.toFixed(2); }

/* ---- Speech: Buddy talks out loud using the browser's built-in voice ---- */
let hasGreetedThisLoad = false;
function pickLine(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function nameOrFallback(){ return state.kidName && state.kidName.trim() ? state.kidName.trim() : 'friend'; }
function speakOnce(text){
  if (hasGreetedThisLoad) return;
  hasGreetedThisLoad = true;
  buddySpeak(text);
}
function buddySpeak(text){
  updateSpeechBubble(text);
  if (!('speechSynthesis' in window)) return;
  try {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.95; utter.pitch = 1.25; utter.volume = 1;
    utter.onstart = () => setBuddyTalking(true);
    utter.onend = () => setBuddyTalking(false);
    utter.onerror = () => setBuddyTalking(false);
    window.speechSynthesis.speak(utter);
  } catch(e) {}
}
function updateSpeechBubble(text){
  const el = document.getElementById('buddyBubble');
  if (el) el.textContent = text;
}

async function loadState(){
  try {
    const raw = localStorage.getItem(STORE_KEY);
    state = raw ? JSON.parse(raw) : defaultState();
  } catch(e) {
    state = defaultState();
  }
  if (state.kidName === undefined) state.kidName = '';
  if (state.lastWeeklySummaryShown === undefined) state.lastWeeklySummaryShown = null;
  rolloverIfNeeded();
  if (!state.buddy.setup) { view = 'setup'; }
  render();
  if (state.buddy.setup) { maybeShowWeeklySummary(); speakOnce(pickLine(GREETING_LINES)); }
}

async function saveState(){
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  } catch(e) { console.error('save failed', e); }
}

function rolloverIfNeeded(){
  const tk = todayKey();
  if (state.lastDate && state.lastDate !== tk) {
    const yEntries = state.progress[state.lastDate] ? Object.keys(state.progress[state.lastDate].entries||{}).length : 0;
    if (yEntries > 0 && yEntries >= state.tasks.length) {
      state.streak = (state.streak || 0) + 1;
    } else {
      state.streak = 0;
    }
  }
  state.lastDate = tk;
  if (!state.progress[tk]) state.progress[tk] = { entries: {} };
  checkAchievements();
}

function maybeShowWeeklySummary(){
  const d = new Date();
  const tk = todayKey();
  if (d.getDay() === 6 && state.lastWeeklySummaryShown !== tk) { // Saturday
    state.lastWeeklySummaryShown = tk;
    saveState();
    setTimeout(()=> openWeeklySummary(true), 400);
  }
}

function checkAchievements(){
  let newlyUnlocked = [];
  for (const a of ACHIEVEMENTS) {
    if (!state.unlocked.includes(a.id) && a.test(state)) {
      state.unlocked.push(a.id);
      newlyUnlocked.push(a);
    }
  }
  return newlyUnlocked;
}

function playChime(){
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      osc.connect(gain); gain.connect(ctx.destination);
      const t = ctx.currentTime + i * 0.15;
      gain.gain.setValueAtTime(0.001, t);
      gain.gain.exponentialRampToValueAtTime(0.25, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.32);
    });
  } catch(e) {}
}

function greeting(){
  const h = new Date().getHours();
  const name = nameOrFallback();
  if (h < 12) return `Good morning, ${name}! Ready for today's quest? ☀️`;
  if (h < 17) return `Hey ${name}! Keep up the great work! 🌤️`;
  return `Evening, ${name}! Let's finish strong! 🌙`;
}

function classifyTasks(){
  const tk = todayKey();
  const entries = (state.progress[tk] && state.progress[tk].entries) || {};
  const hm = nowHM();
  const sorted = [...state.tasks].sort((a,b)=> a.time.localeCompare(b.time));
  return sorted.map(t => ({
    ...t,
    done: entries.hasOwnProperty(t.id),
    due: !entries.hasOwnProperty(t.id) && t.time <= hm,
  }));
}

function todayPoints(){
  const tk = todayKey();
  const entries = (state.progress[tk] && state.progress[tk].entries) || {};
  return Object.values(entries).reduce((a,b)=>a+b,0);
}

function toggleTask(id){
  const tk = todayKey();
  if (!state.progress[tk]) state.progress[tk] = { entries: {} };
  const entries = state.progress[tk].entries;
  const task = state.tasks.find(t=>t.id===id);
  if (!task) return;
  if (entries.hasOwnProperty(id)) {
    delete entries[id];
    saveState(); render();
  } else {
    entries[id] = task.points;
    const newAch = checkAchievements();
    saveState();
    celebrate(task, newAch);
  }
}

function celebrate(task, newAch){
  playChime();
  const tk = todayKey();
  const doneCount = Object.keys((state.progress[tk]&&state.progress[tk].entries)||{}).length;
  const allDone = doneCount >= state.tasks.length && state.tasks.length > 0;
  const line = allDone ? pickLine(ALL_DONE_LINES) : `${pickLine(TASK_DONE_LINES)} ${task.name} done!`;
  buddySpeak(line);
  const root = document.createElement('div');
  root.className = 'celebrate-overlay';
  const sparkles = Array.from({length:10}).map(()=>{
    const angle = Math.random()*360, dist = 60+Math.random()*60;
    const x = Math.cos(angle*Math.PI/180)*dist, y = Math.sin(angle*Math.PI/180)*dist;
    const emo = ['⭐','✨','🌟'][Math.floor(Math.random()*3)];
    return `<span class="sparkle" style="--end:translate(${x}px,${y}px); left:50%; top:42%;">${emo}</span>`;
  }).join('');
  root.innerHTML = `
    ${sparkles}
    <div class="celebrate-card">
      <div class="big">👍✨</div>
      <div style="font-family:'Baloo 2'; font-weight:800; font-size:20px; margin-top:8px;">Awesome job!</div>
      <div style="font-weight:700; opacity:0.7; margin-top:4px;">${task.name} complete · +${task.points} pts</div>
      <div style="font-weight:800; opacity:0.55; margin-top:2px; font-size:13px;">💵 ${fmtMoney(dayMoney(tk))} earned today</div>
    </div>`;
  document.body.appendChild(root);
  setTimeout(()=>{ root.remove(); render(); if (newAch && newAch.length) showAchievementToast(newAch); }, 1300);
}

function showAchievementToast(list){
  list.forEach((a,i)=>{
    setTimeout(()=>{
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = `${a.emoji} Achievement unlocked: ${a.title}!`;
      document.body.appendChild(t);
      setTimeout(()=>t.remove(), 2600);
    }, i*2800);
  });
}

function checkReminders(){
  const tk = todayKey();
  if (state.lastDate !== tk) { rolloverIfNeeded(); saveState(); render(); return; }
  const hm = nowHM();
  const entries = (state.progress[tk] && state.progress[tk].entries) || {};
  for (const t of state.tasks) {
    if (t.time === hm && !entries.hasOwnProperty(t.id)) {
      const key = tk+'|'+t.id+'|'+hm;
      if (!notifiedThisTick.has(key)) {
        notifiedThisTick.add(key);
        playChime();
        const banner = document.createElement('div');
        banner.className = 'toast';
        banner.innerHTML = `⏰ Time for: ${avatarPreviewHtml(t.emoji, 18)} ${t.name}!`;
        document.body.appendChild(banner);
        setTimeout(()=>banner.remove(), 3500);
      }
    }
  }
}

function renderBuddy(){
  const tasks = classifyTasks();
  const done = tasks.filter(t=>t.done);
  const due = tasks.filter(t=>t.due && !t.done);
  const upcoming = tasks.filter(t=>!t.due && !t.done);
  const pct = tasks.length ? done.length/tasks.length : 0;
  const stars = Array.from({length:5}).map((_,i)=> `<span class="${i < Math.round(pct*5) ? 'lit':''}">⭐</span>`).join('');

  const sectionHtml = (label, list) => {
    if (!list.length) return '';
    return `<div class="section-label">${label}</div>` + list.map(taskCardHtml).join('');
  };

  return `
    <div class="topbar">
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <div class="points-badge">✨ ${todayPoints()} today</div>
        <div class="streak-badge">🔥 ${state.streak||0} day streak</div>
        <div class="points-badge">💵 ${fmtMoney(dayMoney(todayKey()))}</div>
      </div>
      <div style="display:flex; gap:8px; flex-shrink:0;">

function taskCardHtml(t){
  return `
    <div class="task-card ${t.done?'done':''} ${t.due?'due':''}" data-id="${t.id}">
      <div class="task-emoji">${avatarPreviewHtml(t.emoji, 24)}</div>

function formatTime(t){
  const [h,m] = t.split(':').map(Number);
  const ap = h>=12?'PM':'AM';
  const hh = ((h+11)%12)+1;
  return `${hh}:${String(m).padStart(2,'0')} ${ap}`;
}

  });
}

/* ================= 3D BUDDY CHARACTER (Three.js) ================= */
let buddy3D = null; // { renderer, scene, camera, group, mouth, eyes, avatarKey, talking }

function buildCharacterGroup(avatarKey){
  const style = AVATAR_STYLES[avatarKey] || AVATAR_STYLES['🦊'];
  const group = new THREE.Group();

  const bodyMat = new THREE.MeshStandardMaterial({ color: style.color, roughness:0.6 });
  const bellyMat = new THREE.MeshStandardMaterial({ color: style.belly, roughness:0.7 });
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x2A2A35, roughness:0.4 });
  const whiteMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness:0.4 });

  // Body
  const body = new THREE.Mesh(new THREE.SphereGeometry(1, 24, 24), bodyMat);
  body.scale.set(1, 0.92, 0.95);
  group.add(body);

  // Belly patch
  const belly = new THREE.Mesh(new THREE.SphereGeometry(0.6, 20, 20), bellyMat);
  belly.position.set(0, -0.15, 0.78);
  belly.scale.set(1, 1.1, 0.35);
  group.add(belly);

  // Eyes (white + pupil), stored for blinking
  const eyeGroup = new THREE.Group();
  [-0.36, 0.36].forEach(x=>{
    const white = new THREE.Mesh(new THREE.SphereGeometry(0.19, 16, 16), whiteMat);
    white.position.set(x, 0.22, 0.86);
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.09, 12, 12), darkMat);
    pupil.position.set(x, 0.22, 0.99);
    eyeGroup.add(white, pupil);
  });
  group.add(eyeGroup);

  // Mouth (flattened sphere, scales vertically to talk)
  const mouth = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), darkMat);
  mouth.position.set(0, -0.28, 0.9);
  mouth.scale.set(1, 0.25, 0.4);
  group.add(mouth);

  // Cheeks (blush)
  const cheekMat = new THREE.MeshStandardMaterial({ color: 0xFFB3B3, roughness:0.8, transparent:true, opacity:0.7 });
  [-0.58, 0.58].forEach(x=>{
    const cheek = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), cheekMat);
    cheek.position.set(x, 0.0, 0.82);
    cheek.scale.set(1,0.7,0.3);
    group.add(cheek);
  });

  // Ears / head features by type
  const earMat = bodyMat;
  if (style.ear === 'pointy') {
    [-0.55, 0.55].forEach(x=>{
      const ear = new THREE.Mesh(new THREE.ConeGeometry(0.28, 0.5, 12), earMat);
      ear.position.set(x, 0.95, 0.1);
      ear.rotation.z = x < 0 ? 0.25 : -0.25;
      group.add(ear);
    });
  } else if (style.ear === 'round' || style.ear === 'roundBig') {
    const r = style.ear === 'roundBig' ? 0.34 : 0.26;
    [-0.62, 0.62].forEach(x=>{
      const ear = new THREE.Mesh(new THREE.SphereGeometry(r, 14, 14), earMat);
      ear.position.set(x, 0.88, 0.05);
      group.add(ear);
    });
  } else if (style.ear === 'roundSmall') {
    [-0.68, 0.68].forEach(x=>{
      const ear = new THREE.Mesh(new THREE.SphereGeometry(0.18, 14, 14), earMat);
      ear.position.set(x, 0.82, 0.0);
      group.add(ear);
    });
  } else if (style.ear === 'roundBlack') {
    [-0.62, 0.62].forEach(x=>{
      const ear = new THREE.Mesh(new THREE.SphereGeometry(0.28, 14, 14), darkMat);
      ear.position.set(x, 0.88, 0.05);
      group.add(ear);
    });
  } else if (style.ear === 'long') {
    [-0.42, 0.42].forEach(x=>{
      const ear = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.16, 0.85, 12), earMat);
      ear.position.set(x, 1.15, 0.05);
      ear.rotation.z = x < 0 ? 0.1 : -0.1;
      group.add(ear);
    });
  } else if (style.ear === 'horn') {
    const horn = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.55, 12), new THREE.MeshStandardMaterial({ color:0xFFD166 }));
    horn.position.set(0, 1.1, 0.35);
    horn.rotation.z = 0.1;
    group.add(horn);
  } else if (style.ear === 'wings') {
    [-0.9, 0.9].forEach(x=>{
      const wing = new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.6, 6), earMat);
      wing.position.set(x, 0.4, -0.2);
      wing.rotation.z = x < 0 ? 1.3 : -1.3;
      group.add(wing);
    });
  }

  if (style.glasses) {
    const frameMat = new THREE.MeshStandardMaterial({ color: 0x2A2A6E, roughness:0.3 });
    [-0.36, 0.36].forEach(x=>{
      const ring = new THREE.Mesh(new THREE.TorusGeometry(0.22, 0.03, 10, 24), frameMat);
      ring.position.set(x, 0.22, 0.95);
      group.add(ring);
    });
    const bridge = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.16, 8), frameMat);
    bridge.rotation.z = Math.PI/2;
    bridge.position.set(0, 0.22, 0.97);
    group.add(bridge);
  }

  group.userData = { eyeGroup, mouth };
  return group;
}

function ensureBuddy3D(container){
  const avatarKey = state.buddy.avatar;
  if (buddy3D && buddy3D.avatarKey === avatarKey) return buddy3D;

  // Rebuild character (avatar changed or first run)
  if (!buddy3D) {
    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
    renderer.setSize(180, 180);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(32, 1, 0.1, 20);
    camera.position.set(0, 0.15, 4.2);
    const key = new THREE.DirectionalLight(0xffffff, 1.0); key.position.set(2,3,4); scene.add(key);
    const amb = new THREE.AmbientLight(0xffffff, 0.65); scene.add(amb);
    buddy3D = { renderer, scene, camera, group:null, avatarKey:null, talking:false, blinkT:0, mounted:false };
    startBuddyLoop();
  }
  if (buddy3D.group) buddy3D.scene.remove(buddy3D.group);
  const group = buildCharacterGroup(avatarKey);
  buddy3D.scene.add(group);
  buddy3D.group = group;
  buddy3D.avatarKey = avatarKey;
  return buddy3D;
}

function mountBuddy3D(containerId){
  if (typeof THREE === 'undefined') return; // library still loading; skip gracefully
  const container = document.getElementById(containerId);
  if (!container) return;
  const b = ensureBuddy3D(container);
  if (b.renderer.domElement.parentElement !== container) {
    container.innerHTML = '';
    container.appendChild(b.renderer.domElement);
  }
}

function startBuddyLoop(){
  function tick(){
    requestAnimationFrame(tick);
    if (!buddy3D || !buddy3D.group) return;
    const t = performance.now() / 1000;
    buddy3D.group.rotation.y = Math.sin(t*0.6) * 0.18;
    buddy3D.group.position.y = Math.sin(t*1.4) * 0.05;

    // Blink every ~4s
    const blinkPhase = (t % 4);
    const blink = blinkPhase > 3.85 ? 0.15 : 1;
    if (buddy3D.group.userData.eyeGroup) buddy3D.group.userData.eyeGroup.scale.y = blink;

    // Mouth talk animation
    const mouth = buddy3D.group.userData.mouth;
    if (mouth) {
      if (buddy3D.talking) {
        mouth.scale.y = 0.2 + Math.abs(Math.sin(t*14)) * 0.55;
      } else {
        mouth.scale.y = 0.25;
      }
    }
    buddy3D.renderer.render(buddy3D.scene, buddy3D.camera);
  }
  requestAnimationFrame(tick);
}

function setBuddyTalking(isTalking){
  if (buddy3D) buddy3D.talking = isTalking;
}

/* ================= BACKUP & RESTORE ================= */
function openBackupModal(){
  const json = JSON.stringify(state);
  const overlay = document.createElement('div');
  overlay.className = 'overlay center';
  overlay.innerHTML = `
    <div class="sheet" style="text-align:center; position:relative;">
      <button class="close-x" id="closeBackup">✕</button>
      <div style="font-size:40px;">💾</div>
      <h2 style="margin:4px 0 6px;">Backup Your Data</h2>
      <p style="opacity:0.7; font-weight:600; font-size:13px; margin-bottom:10px;">
        Copy this text and save it somewhere safe (Notes app, email to yourself).
        If anything ever gets wiped, paste it back in using Restore.
      </p>
      <textarea id="backupText" readonly style="width:100%; height:140px; border-radius:12px; border:2px solid #E3E8F5; padding:10px; font-size:11px; font-family:monospace;">${json}</textarea>
      <button class="btn btn-primary" id="copyBackupBtn">📋 Copy to Clipboard</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('closeBackup').addEventListener('click', ()=> overlay.remove());
  document.getElementById('copyBackupBtn').addEventListener('click', async ()=>{
    const ta = document.getElementById('backupText');
    ta.select();
    try {
      await navigator.clipboard.writeText(json);
      document.getElementById('copyBackupBtn').textContent = '✅ Copied!';
    } catch(e) {
      document.execCommand('copy');
      document.getElementById('copyBackupBtn').textContent = '✅ Copied!';
    }
  });
}

function openRestoreModal(){
  const overlay = document.createElement('div');
  overlay.className = 'overlay center';
  overlay.innerHTML = `
    <div class="sheet" style="text-align:center; position:relative;">
      <button class="close-x" id="closeRestore">✕</button>
      <div style="font-size:40px;">♻️</div>
      <h2 style="margin:4px 0 6px;">Restore From Backup</h2>
      <p style="opacity:0.7; font-weight:600; font-size:13px; margin-bottom:10px;">
        Paste a backup you saved earlier. This will replace everything currently in the app.
      </p>
      <textarea id="restoreText" placeholder="Paste your backup text here..." style="width:100%; height:140px; border-radius:12px; border:2px solid #E3E8F5; padding:10px; font-size:11px; font-family:monospace;"></textarea>
      <button class="btn btn-primary" id="doRestoreBtn">Restore</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('closeRestore').addEventListener('click', ()=> overlay.remove());
  document.getElementById('doRestoreBtn').addEventListener('click', ()=>{
    const raw = document.getElementById('restoreText').value.trim();
    try {
      const parsed = JSON.parse(raw);
      if (!parsed.tasks || !parsed.buddy) throw new Error('not a valid backup');
      state = parsed;
      if (state.kidName === undefined) state.kidName = '';
      if (state.lastWeeklySummaryShown === undefined) state.lastWeeklySummaryShown = null;
      saveState();
      overlay.remove();
      view = 'buddy';
      render();
      alert('Restored! Your tasks and progress are back.');
    } catch(e) {
      alert("That doesn't look like a valid backup. Make sure you pasted the full text.");
    }
  });
}

loadState();
